name: Test

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/test.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.python-version'
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'src/**/*.json'
      - 'src/**/*.md'
      - 'tests/fixtures/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/test.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.python-version'
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'src/**/*.json'
      - 'src/**/*.md'
      - 'tests/fixtures/**'

jobs:
  pytest:
    name: pytest — py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install test dependencies
        # --extra parquet pulls pyarrow so the txns_parquet_v1 round-
        # trip tests run instead of skipping. --extra notebook adds
        # the marimo template + altair plot lib deps so the notebook
        # smoke tests run. Both extras stay optional for end users;
        # only CI + dev installs pull them in.
        run: uv sync --group test --extra parquet --extra notebook --python ${{ matrix.python-version }}

      # The verible-dependent tests (test_verible_wrapper.py end-to-end,
      # and the discover stage tests once #2 lands) skip when the binary
      # isn't reachable. Cache the vendored binary keyed on the pinned-
      # version constant so we pay the download cost once per version
      # bump, not once per CI run.
      - name: Cache vendored Verible
        id: cache-verible
        uses: actions/cache@v4
        with:
          path: vendor/verible
          key: verible-${{ runner.os }}-${{ hashFiles('src/rtl_buddy_axi_profiler/_verible_install.py') }}

      - name: Fetch Verible (cache miss only)
        if: steps.cache-verible.outputs.cache-hit != 'true'
        run: uv run --python ${{ matrix.python-version }} python scripts/fetch_verible.py

      - name: Run pytest
        run: uv run --python ${{ matrix.python-version }} pytest -q
