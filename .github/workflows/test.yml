name: Test

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/test.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.python-version'
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'src/**/*.json'
      - 'src/**/*.md'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/test.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.python-version'
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'src/**/*.json'
      - 'src/**/*.md'

jobs:
  pytest:
    name: pytest — py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install test dependencies
        run: uv sync --group test --python ${{ matrix.python-version }}

      - name: Run pytest
        run: uv run --python ${{ matrix.python-version }} pytest -q
